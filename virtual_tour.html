<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AI 3D Virtual Tour</title>
    <!-- Include A-Frame and the 'look-at' component for hotspots -->
    <script src="https://aframe.io"></script>
    <script src="https://unpkg.com"></script>
    
    <script>
      // Custom component to change the room when a hotspot is clicked
      AFRAME.registerComponent('navigate-on-click', {
        schema: { url: { default: '' } },
        init: function () {
          var data = this.data;
          this.el.addEventListener('click', function () {
            // Change the 'src' of the skybox to the new image ID
            document.querySelector('#skybox').setAttribute('src', data.url);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <!-- 1. Assets: Preload your 360 images here -->
      <a-assets>
        <!-- Replace URLs with your equirectangular image links -->
        <img id="room1" src="creft.png">
        <img id="room2" src="creft.png">
        <img id="hotspot-icon" src="https://img.icons8.com">
      </a-assets>

      <!-- 2. The Skybox: This is the 360-degree background -->
      <a-sky id="skybox" src="#room1" rotation="0 -90 0"></a-sky>

      <!-- 3. Hotspots: Interactive markers to change rooms -->
      <!-- Positioned in 3D space [X Y Z] -->
      <a-image 
        src="#hotspot-icon" 
        position="-4 1.5 -8" 
        look-at="#main-camera"
        navigate-on-click="url: #room2"
        animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true">
      </a-image>

      <!-- 4. Camera: Includes a 'fuse' cursor for gaze interaction -->
      
        <a-cursor 
          id="cursor"
          animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
          animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
          event-set__mouseenter="_event: mouseenter; color: springgreen"
          event-set__mouseleave="_event: mouseleave; color: black"
          raycaster="objects: .clickable">
        </a-cursor>
      
    </a-scene>
  </body>
</html>
